server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: privacy-compliance
  
  # H2 数据库配置（开发用，第一阶段用假数据）
  datasource:
    url: jdbc:h2:mem:privacydb
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT 配置
jwt:
  secret: privacy-compliance-secret-key-2026
  expiration: 86400000

# API 配置
api:
  prefix: /api
